<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Activation System</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <!-- ส่วนชื่อผู้ใช้ -->
            <div class="input-group">
                <div class="label-title">
                    <i class="fa-solid fa-user"></i> ชื่อผู้ใช้
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้งาน">
                </div>
            </div>

            <!-- ส่วนรหัสผ่าน -->
            <div class="input-group">
                <div class="label-title">
                    <i class="fa-solid fa-lock"></i> รหัสผ่าน
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="กรอกรหัสผ่าน">
                </div>
            </div>

            <button class="btn-submit" onclick="handleLogin()">เข้าสู่ระบบ / เปิดใช้งาน</button>
            
            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
